<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cookie Cleaner</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    width: 320px;
    background: #0f0f13;
    color: #e8e6f0;
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  .header {
    padding: 20px 20px 16px;
    border-bottom: 1px solid #1e1e2a;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }

  .header-text h1 {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.01em;
    color: #f0eeff;
  }

  .header-text p {
    font-size: 11px;
    color: #6b6880;
    margin-top: 1px;
  }

  .site-card {
    margin: 16px 16px 8px;
    background: #16161f;
    border: 1px solid #1e1e2a;
    border-radius: 10px;
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    min-height: 52px;
  }

  .site-favicon {
    width: 20px;
    height: 20px;
    border-radius: 4px;
    flex-shrink: 0;
    background: #1e1e2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    color: #6b6880;
    overflow: hidden;
  }

  .site-favicon img {
    width: 16px;
    height: 16px;
  }

  .site-info {
    min-width: 0;
    flex: 1;
  }

  .site-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #6b6880;
    font-weight: 500;
    margin-bottom: 3px;
  }

  .site-domain {
    font-size: 13px;
    font-weight: 600;
    color: #a78bfa;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .site-domain.unavailable {
    color: #6b6880;
    font-weight: 400;
    font-style: italic;
  }

  .last-cleaned {
    margin: 0 16px 16px;
    padding-left: 4px;
    font-size: 11px;
    color: #6b6880;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .clear-btn {
    display: block;
    width: calc(100% - 32px);
    margin: 0 16px 16px;
    padding: 11px;
    background: linear-gradient(135deg, #7c3aed, #4f46e5);
    color: white;
    border: none;
    border-radius: 9px;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.01em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .clear-btn:hover:not(:disabled) {
    opacity: 0.92;
    transform: translateY(-1px);
  }

  .clear-btn:active:not(:disabled) {
    transform: translateY(0);
  }

  .clear-btn:disabled {
    opacity: 0.35;
    cursor: not-allowed;
    transform: none;
  }

  .status {
    margin: 0 16px 16px;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 500;
    line-height: 1.4;
    display: none;
  }

  .status.visible {
    display: block;
  }

  .status.working {
    background: #16161f;
    border: 1px solid #1e1e2a;
    color: #8b85a8;
  }

  .status.success {
    background: #0d2218;
    border: 1px solid #14532d;
    color: #4ade80;
  }

  .status.error {
    background: #2a0d0d;
    border: 1px solid #7f1d1d;
    color: #f87171;
  }

  .spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 1.5px solid #4f46e5;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
    margin-top: -2px;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<div class="header">
  <div class="icon">🍪</div>
  <div class="header-text">
    <h1>Cookie Cleaner</h1>
    <p>Clear cookies instantly</p>
  </div>
</div>

<div class="site-card">
  <div class="site-favicon" id="faviconWrap">
    <span id="faviconFallback">🌐</span>
  </div>
  <div class="site-info">
    <div class="site-label">Active site</div>
    <div class="site-domain" id="site">Loading…</div>
  </div>
</div>

<div class="last-cleaned" id="lastCleaned"></div>

<button class="clear-btn" id="clearBtn">Clear Cookies</button>

<div class="status" id="status"></div>

<script src="popup.js"></script>
</body>
</html>
